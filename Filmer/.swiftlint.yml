# Directory and file filters

excluded:
  - Project.swift
  - TuistAssets+SharedResources.swift
  - TuistBundle+SharedResources.swift
  - TuistAssets+Filmer.swift
  - TuistBundle+Filmer.swift
  - Pods

warning_threshold: 15

disabled_rules:
  - trailing_whitespace

line_length:
  warning: 150

function_parameter_count:
  warning: 10
  error: 15

file_length:
  warning: 500

type_body_length:
  warning: 400
  error: 450
